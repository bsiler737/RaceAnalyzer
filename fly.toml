app = 'raceanalyzer'
primary_region = 'sjc'

[build]

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
