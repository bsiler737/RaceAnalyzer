app = "raceanalyzer"
primary_region = "sea"  # Seattle -- closest to PNW users

[build]

[env]
  RACEANALYZER_DB_PATH = "/data/raceanalyzer.db"
  RACEANALYZER_PROD = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[mounts]
  source = "ra_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Pipeline commands (run via: fly ssh console -C "<command>"):
#   python -m raceanalyzer update-calendar
#   python -m raceanalyzer fetch-startlists
#   python -m raceanalyzer fetch-polylines
#   python -m raceanalyzer elevation-extract
#   python -m raceanalyzer compute-predictions
