app = "raceanalyzer"
primary_region = "sjc"  # San Jose -- where our machine and volume live

[build]

[env]
  RACEANALYZER_DB_PATH = "/data/raceanalyzer.db"
  RACEANALYZER_PROD = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"    # Recommend idle timeout >= 10 minutes (longer than the longest pipeline run)
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[mounts]
  source = "ra_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Pipeline commands (run via: fly ssh console -C "<command>"):
#   python -m raceanalyzer refresh-all              # Full weekly pipeline (automated by scheduler)
#   python -m raceanalyzer refresh-all --daily      # Daily pipeline only
#   python -m raceanalyzer refresh-all --force      # Bypass 24h cooldowns
#   python -m raceanalyzer fetch-calendar            # Discover upcoming races
#   python -m raceanalyzer fetch-startlists          # Fetch registered riders
#   python -m raceanalyzer fetch-polylines           # Fetch RWGPS polylines
#   python -m raceanalyzer elevation-extract         # Extract elevation data
#   python -m raceanalyzer course-profile-extract    # Build profiles/detect climbs
#   python -m raceanalyzer compute-predictions       # Recompute predictions
