name: Wake Fly.io Machine

# Curl /health daily to wake the machine, triggering the scheduler's
# overdue check on cold start.  No secrets needed — /health is public.

on:
  schedule:
    - cron: '0 14 * * *'  # 14:00 UTC / 6 AM PST
  workflow_dispatch:       # Manual trigger

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf --retry 3 --retry-delay 10 \
            https://raceanalyzer.fly.dev/health \
            && echo "Machine awake." \
            || echo "Wake failed (machine may be starting)."
